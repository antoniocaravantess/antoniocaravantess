name: Actualizar tipo de cambio Banguat

on:
  schedule:
    - cron: '0 14 * * 1-5' # ~08:00 Guatemala (UTC-6), lunes a viernes
    - cron: '0 21 * * 1-5' # ~15:00 Guatemala
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Comparte grupo con el despliegue para no solapar publicaciones
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  actualizar-y-desplegar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Obtener tipo de cambio de Banguat
        run: node scripts/fetch-banguat.mjs

      - name: Guardar el cambio si hay novedad
        run: |
          if [ -n "$(git status --porcelain public/banguat.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/banguat.json
            git commit -m "chore: actualizar tipo de cambio Banguat"
            git push
          else
            echo "Sin cambios en el tipo de cambio"
          fi

      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
